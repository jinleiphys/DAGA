<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DAGA — Make Direct Reactions Great Again</title>
<meta name="description" content="Make Direct Reactions Great Again. Believe me, nobody grazes better than us." />
<meta property="og:title" content="DAGA — Make Direct Reactions Great Again" />
<meta property="og:description" content="Believe me, nobody grazes better than us." />
<meta property="og:type" content="website" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚛️</text></svg>" />
<style>
  :root {
    --red: #b31942;
    --blue: #0a3161;
    --cream: #f5f0e1;
    --ink: #0b0b0b;
    --gold: #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Impact', 'Arial Black', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Stars + stripes background */
  .bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      repeating-linear-gradient(
        180deg,
        var(--cream) 0 60px,
        rgba(179, 25, 66, 0.06) 60px 120px
      );
  }

  main {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    text-align: center;
  }

  .eyebrow {
    display: inline-block;
    background: var(--blue);
    color: #fff;
    padding: 0.5rem 1.2rem;
    font-family: 'Arial Black', sans-serif;
    font-size: clamp(0.75rem, 1.4vw, 1rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    margin-bottom: 2.5rem;
    transform: rotate(-1deg);
  }

  h1 {
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-size: clamp(2.8rem, 9vw, 9rem);
    line-height: 0.9;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--blue);
    text-shadow:
      4px 4px 0 var(--red),
      8px 8px 0 var(--ink);
    margin-bottom: 1.2rem;
    max-width: 18ch;
  }
  h1 .great { color: var(--red); }
  h1 .again {
    display: inline-block;
    background: var(--blue);
    color: var(--gold);
    padding: 0 0.2em;
    transform: rotate(-2deg);
  }

  .tagline {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2.6vw, 2rem);
    color: var(--ink);
    max-width: 28ch;
    margin: 1rem auto 3rem;
    line-height: 1.3;
  }
  .tagline strong { font-style: normal; color: var(--red); text-transform: uppercase; }

  .acronym {
    font-family: 'Courier New', monospace;
    font-size: clamp(0.85rem, 1.6vw, 1.15rem);
    color: var(--blue);
    border-top: 3px solid var(--ink);
    border-bottom: 3px solid var(--ink);
    padding: 0.8rem 1.5rem;
    margin-top: 1rem;
    letter-spacing: 0.08em;
  }
  .acronym b { color: var(--red); }

  footer {
    position: fixed;
    bottom: 1rem;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    color: var(--blue);
    opacity: 0.7;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Subtle float */
  @keyframes tilt {
    0%, 100% { transform: rotate(-1deg); }
    50%      { transform: rotate(1deg); }
  }
  .eyebrow { animation: tilt 6s ease-in-out infinite; }

  @media (max-width: 600px) {
    h1 { text-shadow: 3px 3px 0 var(--red), 6px 6px 0 var(--ink); }
  }
</style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main>
    <span class="eyebrow">⚛ Official DAGA Movement ⚛</span>

    <h1>
      Make<br />
      Direct Reactions<br />
      <span class="great">Great</span> <span class="again">Again</span>
    </h1>

    <p class="tagline">
      Believe me, <strong>nobody grazes</strong> better than us.
    </p>

    <div class="acronym">
      <b>D</b>IRECT&nbsp;re<b>A</b>CTIONS&nbsp;<b>G</b>REAT&nbsp;<b>A</b>GAIN
    </div>
  </main>

  <footer>vibein.science &nbsp;·&nbsp; coming soon</footer>
</body>
</html>
